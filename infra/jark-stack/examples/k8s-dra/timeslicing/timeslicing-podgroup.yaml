# Optional: requires PodGroup API (scheduling.k8s.io/v1alpha2) and DRAWorkloadResourceClaims.
# Not available on EKS 1.34 by default — use timeslicing-claim.yaml + resourceClaimName instead.
apiVersion: resource.k8s.io/v1beta1
kind: ResourceClaimTemplate
metadata:
  name: timeslicing-gpu-template
  namespace: timeslicing-gpu
spec:
  spec:
    devices:
      requests:
      - name: shared-gpu
        deviceClassName: gpu.nvidia.com
      config:
      - requests: ["shared-gpu"]
        opaque:
          driver: gpu.nvidia.com
          parameters:
            apiVersion: resource.nvidia.com/v1beta1
            kind: GpuConfig
            sharing:
              strategy: TimeSlicing
---
apiVersion: scheduling.k8s.io/v1alpha2
kind: PodGroup
metadata:
  name: timeslicing-group
  namespace: timeslicing-gpu
spec:
  schedulingPolicy:
    gang:
      minCount: 2
  resourceClaims:
  - name: shared-gpu
    resourceClaimTemplateName: timeslicing-gpu-template
