gpuResourcesEnabledOverride: true

resources:
  gpus:
    enabled: true
  computeDomains:
    enabled: true

controller:
  affinity:
    nodeAffinity: null
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              dra-driver-nvidia-gpu-component: controller
          topologyKey: kubernetes.io/hostname

kubeletPlugin:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: "nvidia.com/gpu.present"
            operator: In
            values:
            - "true"
          - key: eks.amazonaws.com/compute-type
            operator: NotIn
            values:
            - "auto"
          - key: feature.node.kubernetes.io/system-os_release.ID
            operator: NotIn
            values:
            - "bottlerocket"

  tolerations:
    - key: "nvidia.com/gpu"
      operator: Exists
      effect: NoSchedule

featureGates:
  TimeSlicingSettings: true
  MPSSupport: true   # g6 examples; mutually exclusive with DynamicMIG in driver v25.12.0
  # DynamicMIG: false (default) — JARK MIG uses GPU Operator static partitions on p4de;
  # DRA advertises existing MIG slices via mig.nvidia.com (do not enable with MPSSupport).
