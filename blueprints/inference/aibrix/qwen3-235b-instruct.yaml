apiVersion: v1
kind: Namespace
metadata:
  name: aibrix
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/port: "8000"
    prometheus.io/scrape: "true"
  labels:
    app.kubernetes.io/instance: aibrix-models-ml-train
    model.aibrix.ai/name: qwen3-235b-instruct
    prometheus-discovery: "true"
    model.aibrix.ai/port: "8000"
  name: qwen3-235b-instruct
  namespace: aibrix
spec:
  ports:
  - name: serve
    port: 8000
  - name: http
    port: 8080
  selector:
    model.aibrix.ai/name: qwen3-235b-instruct
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: "2"
  labels:
    adapter.model.aibrix.ai/enabled: "true"
    app.kubernetes.io/instance: aibrix-models-ml-train
    model.aibrix.ai/name: qwen3-235b-instruct
    model.aibrix.ai/port: "8000"
  name: qwen3-235b-instruct
  namespace: aibrix
spec:
  replicas: 1
  selector:
    matchLabels:
      model.aibrix.ai/name: qwen3-235b-instruct
  template:
    metadata:
      labels:
        model.aibrix.ai/name: qwen3-235b-instruct
    spec:
      containers:
      - command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --max-model-len
        - "131072"
        - --model
        - /models/Qwen/Qwen3-235B-A22B-Instruct-2507
        - --tensor-parallel-size
        - "8"
        - --served-model-name
        - qwen3-235b-instruct
        image: vllm/vllm-openai:v0.9.0
        imagePullPolicy: Always
        name: vllm-openai
        ports:
        - containerPort: 8000
          protocol: TCP
        resources:
          limits:
            nvidia.com/gpu: "8"
          requests:
            nvidia.com/gpu: "8"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /dev/shm
          name: shared-mem
        - mountPath: /models
          name: models
      - command:
        - aibrix_runtime
        - --port
        - "8080"
        env:
        - name: INFERENCE_ENGINE
          value: vllm
        - name: INFERENCE_ENGINE_ENDPOINT
          value: http://localhost:8000
        image: aibrix/runtime:v0.3.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 3
          periodSeconds: 2
          successThreshold: 1
          timeoutSeconds: 1
        name: aibrix-runtime
        ports:
        - containerPort: 8080
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /dev/shm
          name: shared-mem
        - mountPath: /models
          name: models
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - aibrix_download
        - --model-uri
        - Qwen/Qwen3-235B-A22B-Instruct-2507
        - --local-dir
        - /models/
        env:
        - name: DOWNLOADER_MODEL_NAME
          value: qwen3-235b-instruct
        - name: DOWNLOADER_NUM_THREADS
          value: "16"
        - name: DOWNLOADER_ALLOW_FILE_SUFFIX
          value: json, safetensors, py
        image: aibrix/runtime:v0.3.0
        imagePullPolicy: IfNotPresent
        name: init-model
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /dev/shm
          name: shared-mem
        - mountPath: /models
          name: models
      nodeSelector:
        node.kubernetes.io/instance-type: p5.48xlarge
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      volumes:
      - emptyDir:
          medium: Memory
        name: shared-mem
      - hostPath:
          path: /mnt/k8s-disks/0/aibrix
          type: DirectoryOrCreate
        name: models
